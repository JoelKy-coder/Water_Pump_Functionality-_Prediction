<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Water Pump Predictor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h1 class="h3 mb-4">Water Pump Functionality Predictor</h1>
                    <form method="post" action="{{ url_for('predict') }}">
                        <div class="mb-3"><label class="form-label">amount_tsh</label><input type="number" step="any" class="form-control" name="amount_tsh" value="0"></div>
                        <div class="mb-3"><label class="form-label">gps_height</label><input type="number" class="form-control" name="gps_height" value="0"></div>
                        <div class="mb-3"><label class="form-label">population</label><input type="number" class="form-control" name="population" value="0"></div>
                        <div class="mb-3"><label class="form-label">latitude</label><input type="number" step="any" class="form-control" name="latitude" value="-3.2"></div>
                        <div class="mb-3"><label class="form-label">longitude</label><input type="number" step="any" class="form-control" name="longitude" value="35.0"></div>
                        <div class="mb-3"><label class="form-label">basin</label><input type="text" class="form-control" name="basin" value="Lake Victoria"></div>
                        <div class="mb-3"><label class="form-label">region</label><input type="text" class="form-control" name="region" value="Kilimanjaro"></div>
                        <div class="mb-3"><label class="form-label">management</label><input type="text" class="form-control" name="management" value="vwc"></div>
                        <div class="mb-3"><label class="form-label">extraction_type</label><input type="text" class="form-control" name="extraction_type" value="gravity"></div>
                        <div class="mb-3"><label class="form-label">payment</label><input type="text" class="form-control" name="payment" value="never pay"></div>
                        <div class="mb-3"><label class="form-label">water_quality</label><input type="text" class="form-control" name="water_quality" value="soft"></div>
                        <div class="mb-3"><label class="form-label">quantity</label><input type="text" class="form-control" name="quantity" value="enough"></div>
                        <div class="mb-3"><label class="form-label">waterpoint_type</label><input type="text" class="form-control" name="waterpoint_type" value="communal standpipe"></div>
                        <div class="mb-3"><label class="form-label">public_meeting</label><select class="form-select" name="public_meeting"><option value="True">True</option><option value="False">False</option></select></div>
                        <div class="mb-3"><label class="form-label">permit</label><select class="form-select" name="permit"><option value="True">True</option><option value="False">False</option></select></div>
                        <button class="btn btn-primary" type="submit">Predict</button>
                    </form>
                    {% if prediction %}
                    <div class="alert alert-success mt-4" role="status">
                        <strong>Prediction:</strong> {{ prediction }}
                    </div>
                    {% endif %}
                    {% if error %}
                    <div class="alert alert-danger mt-4" role="alert">
                        {{ error }}
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
